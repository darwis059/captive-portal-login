name: Build and Publish Docker Image

# This tells GitHub to run this script every time you push to the 'main' branch
on:
  workflow_dispatch: 
  
# Defines variables for the registry and the image name (your GitHub username/repo)
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    
    # Grants GitHub Actions permission to upload to your Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up QEMU and Buildx so you can build images for ARM devices (like Raspberry Pi)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Logs into GHCR using an automatically generated GitHub token (no passwords needed!)
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds the Docker image and pushes it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # Added linux/arm/v7 for 32-bit ARM architecture
          platforms: linux/amd64,linux/arm64,linux/arm/v7
